name: Patch lookback option

on:
  push:
    paths:
      - '.github/workflows/patch-lookback-option.yml'

permissions:
  contents: write

jobs:
  patch-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add 14d to app.py lookback options
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app.py')
          text = path.read_text(encoding='utf-8')
          old = 'period_options = ["7d", "30d", "60d", "6mo", "1y", "2y"]'
          new = 'period_options = ["7d", "14d", "30d", "60d", "6mo", "1y", "2y"]'
          if old not in text and new not in text:
              raise SystemExit('Expected lookback option line not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit app.py change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py
          git diff --cached --quiet || git commit -m "Directly add 14d lookback option"
          git push
