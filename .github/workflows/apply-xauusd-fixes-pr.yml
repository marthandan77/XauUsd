name: Apply XAUUSD fixes from PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/app-scan-risk-fixes
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply requested edits
        shell: bash
        run: |
          awk '
            /^          python <<'"'"'PY'"'"'$/ { capture=1; next }
            /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-xauusd-fixes.yml > /tmp/apply_xauusd_fixes.py
          python <<'PY'
          from pathlib import Path

          path = Path('/tmp/apply_xauusd_fixes.py')
          lines = path.read_text(encoding='utf-8').splitlines()
          lines = [
              line for line in lines
              if not ('= re.sub(r"^' in line and 'flags=re.MULTILINE' in line)
          ]
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          python /tmp/apply_xauusd_fixes.py
          rm -f .github/workflows/apply-xauusd-fixes-pr.yml

      - name: Validate syntax and whitespace
        shell: bash
        run: |
          git diff --check
          python -m compileall -q app.py src
          python - <<'PY'
          import ast
          from pathlib import Path

          for path in [Path('app.py'), *Path('src').rglob('*.py')]:
              ast.parse(path.read_text(encoding='utf-8'), filename=str(path))
          print('AST validation passed')
          PY

      - name: Commit validated patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A app.py config/default_settings.yaml src/veto_engine.py src/trade_plan.py src/kc_squeeze_engine.py .github/workflows
          git commit -m "Apply scan validation and risk model fixes"
          git push origin HEAD:agent/app-scan-risk-fixes
