name: Apply XAUUSD fixes from PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/app-scan-risk-fixes
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract and run the one-time patch
        shell: bash
        run: |
          cp .github/workflows/apply-xauusd-fixes.yml /tmp/apply-xauusd-fixes.yml
          cp .github/workflows/apply-xauusd-fixes-pr.yml /tmp/apply-xauusd-fixes-pr.yml
          awk '
            /^          python <<'"'"'PY'"'"'$/ { capture=1; next }
            /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-xauusd-fixes.yml > /tmp/apply_xauusd_fixes.py
          python /tmp/apply_xauusd_fixes.py
          mkdir -p .github/workflows
          cp /tmp/apply-xauusd-fixes.yml .github/workflows/apply-xauusd-fixes.yml
          cp /tmp/apply-xauusd-fixes-pr.yml .github/workflows/apply-xauusd-fixes-pr.yml

      - name: Capture validation diagnostics
        shell: bash
        run: |
          set +e
          {
            echo '## git diff --check'
            git diff --check
            echo
            echo '## compileall'
            python -m compileall app.py src
          } > validation.log 2>&1
          cat validation.log
          exit 0

      - name: Commit generated patch and diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py config/default_settings.yaml src/veto_engine.py src/trade_plan.py src/kc_squeeze_engine.py validation.log
          git commit -m "Capture generated XAUUSD patch for validation"
          git push origin HEAD:agent/app-scan-risk-fixes
