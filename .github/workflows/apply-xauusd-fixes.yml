name: Apply XAUUSD scan and risk fixes

on:
  push:
    branches:
      - agent/app-scan-risk-fixes

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/app-scan-risk-fixes
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply requested edits
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          app_path = Path("app.py")
          app = app_path.read_text(encoding="utf-8")

          helpers = '''

          def _sample_freq(settings: dict) -> str:
              interval = str(settings.get("price_interval", "5m"))
              mapping = {"5m": "5min", "15m": "15min", "30m": "30min", "1h": "1h", "4h": "4h", "1d": "1D"}
              return mapping.get(interval, "5min")


          def _interval_minutes(settings: dict) -> float:
              return {"5m": 5, "15m": 15, "30m": 30, "1h": 60, "4h": 240, "1d": 1440}.get(
                  str(settings.get("price_interval", "5m")), 5
              )


          def validate_bars(bars: pd.DataFrame, settings: dict) -> str | None:
              """Returns an error string if bars are unusable, else None."""
              if bars.empty:
                  return "No bars returned from data source."
              required = {"open", "high", "low", "close"}
              if not required.issubset(bars.columns):
                  return f"Missing columns: {required - set(bars.columns)}"
              if bars[list(required)].isna().any().any():
                  return "NaN values present in OHLC data."
              if (bars["high"] < bars["low"]).any():
                  return "Invalid bars: high < low detected."
              if hasattr(bars.index, "tz") and bars.index.tz is not None:
                  age_min = (pd.Timestamp.now(tz=bars.index.tz) - bars.index[-1]).total_seconds() / 60
                  max_age = settings.get("stale_candle_multiplier", 3.0) * _interval_minutes(settings)
                  if age_min > max_age:
                      return f"Stale data: latest bar is {age_min:.0f} min old (limit {max_age:.0f} min)."
              return None
          '''
          helpers = re.sub(r"^          ", "", helpers, flags=re.MULTILINE)
          if "def _sample_freq(settings: dict)" not in app:
              marker = "ROOT = Path(__file__).resolve().parent\n"
              if app.count(marker) != 1:
                  raise RuntimeError("ROOT marker not found exactly once")
              app = app.replace(marker, marker + helpers, 1)

          app = app.replace("_ENGINE: dict[str, Any] | None = None\n\n", "", 1)

          engine_re = re.compile(
              r"def engine\(\) -> dict\[str, Any\]:\n"
              r"    global _ENGINE\n"
              r"    if _ENGINE is not None:\n"
              r"        return _ENGINE\n"
              r"(?P<body>.*?)"
              r"    _ENGINE = locals\(\)\n"
              r"    return _ENGINE\n",
              re.DOTALL,
          )
          engine_replacement = '''@st.cache_resource
          def engine() -> dict[str, Any]:
              from src.ai_explainer import explain
              from src.data_feed import FeedResult, load_csv, load_live_bars, make_sample_bars
              from src.forecast_engine import choose_action, score_forecast
              from src.gate_diagnostics import build_gate_breakdown, signal_stage, summarize_gate_blockers
              from src.horizon_forecast import build_multi_horizon_forecast
              from src.indicators import add_indicators
              from src.kc_squeeze_engine import kc_squeeze_summary
              from src.macro_engine import macro_context
              from src.market_map import build_market_map
              from src.range_model import price_bands
              from src.regime_engine import classify_regime
              from src.trade_plan import advisory_position_size, build_trade_plan
              from src.veto_engine import apply_veto
              return locals()
          '''
          engine_replacement = re.sub(r"^          ", "", engine_replacement, flags=re.MULTILINE)
          app, count = engine_re.subn(engine_replacement, app, count=1)
          if count != 1 and "@st.cache_resource\ndef engine()" not in app:
              raise RuntimeError("engine singleton block replacement failed")

          scan_re = re.compile(r"def run_strategy_scan\(settings: dict, macro_bias: str\) -> dict:\n.*?\n\ndef price_chart", re.DOTALL)
          scan_replacement = '''def run_strategy_scan(settings: dict, macro_bias: str) -> dict:
              e = engine()
              scan_settings = dict(settings)
              try:
                  feed = fetch_bars(scan_settings)
                  error = validate_bars(feed.bars, scan_settings)
                  if error:
                      return {"ok": False, "error": error, "feed": feed, "settings": safe_settings(scan_settings),
                              "scan_time": pd.Timestamp.now(tz="Asia/Singapore"), "multi_horizon": []}

                  scan_settings["signals_disabled"] = feed.source == "sample"
                  scan_settings["signals_disabled_reason"] = "Sample data source; trade signals are disabled until live API or uploaded real CSV is active."

                  bars_raw = e["add_indicators"](feed.bars, scan_settings)
                  bars = bars_raw.dropna(subset=["close", "atr", "ema_fast", "ema_slow", "trend_sma"]).copy()
                  if bars.empty:
                      return {"ok": False, "error": "Not enough clean OHLC data after indicator warm-up.",
                              "feed": feed, "settings": safe_settings(scan_settings),
                              "scan_time": pd.Timestamp.now(tz="Asia/Singapore"), "multi_horizon": []}

                  min_needed = max(scan_settings.get("horizon_model_lookback_bars", 500) // 5, 100)
                  if len(bars) < min_needed:
                      return {"ok": False, "error": f"Only {len(bars)} clean bars; need at least {min_needed}.",
                              "feed": feed, "settings": safe_settings(scan_settings),
                              "scan_time": pd.Timestamp.now(tz="Asia/Singapore"), "multi_horizon": []}

                  multi_horizon = e["build_multi_horizon_forecast"](bars, scan_settings)
                  kc = e["kc_squeeze_summary"](bars, scan_settings)
                  latest_row = bars.iloc[-1].to_dict()
                  latest_row["kc_state"] = kc["state"]
                  latest_row["kc_reason"] = kc["reason"]

                  market = e["build_market_map"](bars, scan_settings)
                  regime = e["classify_regime"](bars, market, scan_settings)
                  macro = e["macro_context"](macro_bias, bool(scan_settings.get("news_block_manual", False)))
                  scores = e["score_forecast"](latest_row, market, regime, macro, scan_settings)
                  if kc["state"] != "insufficient_data":
                      scores["kc_state"] = kc["state"]
                      scores["kc_reason"] = kc["reason"]

                  action = e["choose_action"](scores, scan_settings)
                  plan = e["build_trade_plan"](action, market, scan_settings)
                  bands = e["price_bands"](market, regime)
                  veto = e["apply_veto"](action, plan, market, regime, macro, scan_settings, latest_row, multi_horizon)
                  summary = e["explain"](regime, scores, veto, market, macro)

                  active_plan = veto["final_action"] in ACTIONABLE
                  advisory_qty = 0.0
                  if active_plan and plan.get("entry_zone_low") is not None and plan.get("entry_zone_high") is not None and plan.get("stop") is not None:
                      account_size = float(scan_settings.get("account_size", 10000))
                      advisory_qty = e["advisory_position_size"](
                          account_size,
                          float(scan_settings.get("risk_per_trade_pct", 0.5)) / 100.0,
                          (float(plan["entry_zone_low"]) + float(plan["entry_zone_high"])) / 2.0,
                          float(plan["stop"]),
                      )

                  result = {
                      "ok": True, "scan_time": pd.Timestamp.now(tz="Asia/Singapore"), "feed": feed,
                      "settings": safe_settings(scan_settings), "bars": bars, "kc": kc, "latest_row": latest_row,
                      "market": market, "regime": regime, "macro": macro, "scores": scores, "action": action,
                      "plan": plan, "display_plan": plan, "bands": bands, "veto": veto, "summary": summary,
                      "active_plan": active_plan, "status": "Allowed" if active_plan else "No active trade",
                      "advisory_qty": advisory_qty, "multi_horizon": multi_horizon, "candidate_note": "",
                  }
                  result["signal_stage"] = e["signal_stage"](result)
                  result["gate_breakdown"] = e["build_gate_breakdown"](result)
                  result["gate_summary"] = e["summarize_gate_blockers"](result)
                  return result

              except Exception as exc:
                  import traceback
                  return {
                      "ok": False,
                      "error": f"Scan failed: {exc}",
                      "traceback": traceback.format_exc(),
                      "settings": safe_settings(scan_settings),
                      "scan_time": pd.Timestamp.now(tz="Asia/Singapore"),
                      "multi_horizon": [],
                  }


          def price_chart'''
          scan_replacement = re.sub(r"^          ", "", scan_replacement, flags=re.MULTILINE)
          app, count = scan_re.subn(scan_replacement, app, count=1)
          if count != 1:
              raise RuntimeError("run_strategy_scan replacement failed")
          app_path.write_text(app, encoding="utf-8")

          settings_path = Path("config/default_settings.yaml")
          settings_text = settings_path.read_text(encoding="utf-8")
          if "account_size:" not in settings_text:
              settings_text = settings_text.replace("risk_per_trade_pct: 0.5\n", "risk_per_trade_pct: 0.5\naccount_size: 10000\n", 1)
          if "slippage_model_pips:" not in settings_text:
              settings_text = settings_text.replace("account_size: 10000\n", "account_size: 10000\nslippage_model_pips: 2\n", 1)
          if "min_squeeze_duration_bars:" not in settings_text:
              settings_text = settings_text.replace("kc_squeeze_enabled: true\n", "kc_squeeze_enabled: true\nmin_squeeze_duration_bars: 5\n", 1)
          settings_path.write_text(settings_text, encoding="utf-8")

          veto_path = Path("src/veto_engine.py")
          veto = veto_path.read_text(encoding="utf-8")
          old_rr = '''    rr = room_ratio(action, plan, market)
              if action in ACTIONABLE_PLANS and rr < float(settings.get("min_reward_risk", 1.2)):
                  reasons.append("not enough room to target")
          '''
          old_rr = re.sub(r"^              ", "", old_rr, flags=re.MULTILINE)
          new_rr = '''    entry_low = _finite_float(plan.get("entry_zone_low"))
              entry_high = _finite_float(plan.get("entry_zone_high"))
              entry_mid = None if entry_low is None or entry_high is None else (entry_low + entry_high) / 2.0
              slippage_pips = float(settings.get("slippage_model_pips", 2))
              slippage_price = slippage_pips * 0.01

              rr = room_ratio(action, plan, market)
              if action in ACTIONABLE_PLANS and entry_mid is not None:
                  if action == "BUY PLAN":
                      adjusted_entry = entry_mid + slippage_price
                      adjusted_risk = adjusted_entry - float(plan.get("stop", adjusted_entry))
                      adjusted_room = float(market.resistance) - adjusted_entry
                  else:
                      adjusted_entry = entry_mid - slippage_price
                      adjusted_risk = float(plan.get("stop", adjusted_entry)) - adjusted_entry
                      adjusted_room = adjusted_entry - float(market.support)
                  rr = max(adjusted_room / adjusted_risk, 0.0) if adjusted_risk > 0 else 0.0

              min_room_ratio = float(settings.get("min_reward_risk", 1.2))
              if action in ACTIONABLE_PLANS and rr < min_room_ratio:
                  reasons.append(f"not enough slippage-adjusted room to target: {rr:.2f} < {min_room_ratio:.2f}")
          '''
          new_rr = re.sub(r"^              ", "", new_rr, flags=re.MULTILINE)
          if old_rr not in veto:
              raise RuntimeError("room-ratio block not found")
          veto = veto.replace(old_rr, new_rr, 1)
          veto_path.write_text(veto, encoding="utf-8")

          trade_path = Path("src/trade_plan.py")
          trade = trade_path.read_text(encoding="utf-8")
          if "import math\n" not in trade:
              trade = trade.replace("from __future__ import annotations\n", "from __future__ import annotations\n\nimport math\n", 1)
          trade = trade.replace(
              '''    min_tp1_distance = float(settings.get("min_tp1_atr_distance", 0.9))
          ''',
              '''    min_tp1_distance = float(settings.get("min_tp1_atr_distance", 0.9))
              account_size = float(settings.get("account_size", 10000))
              risk_pct = float(settings.get("risk_per_trade_pct", 0.5)) / 100.0
          '''.replace("              ", ""),
              1,
          )
          trade = trade.replace(
              '''        tp1_too_close = _tp1_too_close(tp1_distance_atr, settings)
                  return {
                      "side": "buy_advisory",
          '''.replace("              ", ""),
              '''        tp1_too_close = _tp1_too_close(tp1_distance_atr, settings)
                  quantity = advisory_position_size(account_size, risk_pct, (entry_low + entry_high) / 2.0, stop)
                  return {
                      "side": "buy_advisory",
                      "quantity": quantity,
          '''.replace("              ", ""),
              1,
          )
          trade = trade.replace(
              '''        tp1_too_close = _tp1_too_close(tp1_distance_atr, settings)

                  return {
                      "side": "sell_advisory",
          '''.replace("              ", ""),
              '''        tp1_too_close = _tp1_too_close(tp1_distance_atr, settings)
                  quantity = advisory_position_size(account_size, risk_pct, (entry_low + entry_high) / 2.0, stop)

                  return {
                      "side": "sell_advisory",
                      "quantity": quantity,
          '''.replace("              ", ""),
              1,
          )
          trade = trade.replace('''            "side": "exit_or_avoid",\n''', '''            "side": "exit_or_avoid",\n            "quantity": 0.0,\n''', 1)
          trade = trade.replace('''        "side": "none",\n''', '''        "side": "none",\n        "quantity": 0.0,\n''', 1)
          trade = trade.replace(
              '''    return (float(account_equity) * float(risk_pct)) / risk_per_unit
          ''',
              '''    raw_quantity = (float(account_equity) * float(risk_pct)) / risk_per_unit
              return math.floor(raw_quantity * 100) / 100
          '''.replace("              ", ""),
              1,
          )
          trade_path.write_text(trade, encoding="utf-8")

          kc_path = Path("src/kc_squeeze_engine.py")
          kc = kc_path.read_text(encoding="utf-8")
          marker = '''    chase_limit = float(settings.get("kc_release_chase_atr_limit", 1.0))
          '''
          marker = re.sub(r"^          ", "", marker, flags=re.MULTILINE)
          duration_block = '''    chase_limit = float(settings.get("kc_release_chase_atr_limit", 1.0))
              min_squeeze_duration = max(int(settings.get("min_squeeze_duration_bars", 5)), 1)

              if squeeze_fired or squeeze_recent:
                  squeeze_series = df["squeeze_on"].fillna(False).astype(bool)
                  fired_series = df["squeeze_fired"].fillna(False).astype(bool)
                  release_positions = [position for position, fired in enumerate(fired_series.tolist()) if fired]
                  if release_positions:
                      release_position = release_positions[-1]
                      compression_duration = 0
                      for position in range(release_position - 1, -1, -1):
                          if not bool(squeeze_series.iloc[position]):
                              break
                          compression_duration += 1
                      if compression_duration < min_squeeze_duration:
                          squeeze_fired = False
                          squeeze_recent = False
                          release_bullish = False
                          release_bearish = False
                          release_chase_risk = False
                          bars_since = None
                          release_chase_atr = None
                          row = row.copy()
                          row["squeeze_fired"] = False
                          row["squeeze_recent"] = False
                          row["bars_since_squeeze_release"] = None
                          row["release_direction"] = "none"
                          row["release_close"] = None
                          row["release_high"] = None
                          row["release_low"] = None
                          row["release_chase_atr"] = None
                          row["release_chase_risk"] = False
                          row["release_bullish_confirmed"] = False
                          row["release_bearish_confirmed"] = False
          '''
          duration_block = re.sub(r"^              ", "", duration_block, flags=re.MULTILINE)
          if "min_squeeze_duration_bars" not in kc:
              if marker not in kc:
                  raise RuntimeError("KC chase-limit marker not found")
              kc = kc.replace(marker, duration_block, 1)
          kc_path.write_text(kc, encoding="utf-8")

          workflow = Path(".github/workflows/apply-xauusd-fixes.yml")
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Validate syntax and whitespace
        run: |
          git diff --check
          python -m compileall -q app.py src

      - name: Commit patched files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py config/default_settings.yaml src/veto_engine.py src/trade_plan.py src/kc_squeeze_engine.py .github/workflows/apply-xauusd-fixes.yml
          git commit -m "Apply scan validation and risk model fixes"
          git push origin HEAD:agent/app-scan-risk-fixes
